<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sushi Ange App</title>
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sushi Ange" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;min-height:100vh;background:radial-gradient(circle at top left,rgba(214,40,40,.18),transparent 35%),linear-gradient(180deg,#fff,#eee);display:flex;align-items:center;justify-content:center;color:#1f1f1f;padding:18px}.card{width:100%;max-width:430px;background:white;border-radius:26px;padding:22px;box-shadow:0 10px 28px rgba(0,0,0,.14);text-align:center}h1{margin:0 0 8px;text-transform:uppercase}.muted{color:#666;margin-bottom:18px}.btn{display:block;text-decoration:none;border-radius:16px;padding:16px;margin-top:12px;font-weight:900}.red{background:linear-gradient(135deg,#d62828,#9d0208);color:white}.dark{background:#111;color:white}.note{font-size:13px;color:#666;margin-top:18px;line-height:1.35}
  </style>
</head>
<body>
  <div class="card">
    <h1>🍣 Sushi Ange</h1>
    <div class="muted">Panel instalable para iPhone</div>
    <a class="btn red" href="pedidos.html">📋 Pedidos</a>
    <a class="btn dark" href="admin.html">🔐 Admin</a>
    <div class="note">En iPhone: abrir en Safari → compartir → “Agregar a pantalla de inicio”.</div>
  </div>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("service-worker.js").catch(console.warn));
    }
  </script>
</body>
</html>
